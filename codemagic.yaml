workflows:
  android-release:
    name: ChargeShield Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        BUNDLE_ID: com.chargeshield.app
    scripts:
      - name: Decode Firebase config files
        script: |
          printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | base64 --decode > android/app/google-services.json
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" | tr -d '[:space:]' | base64 --decode > ios/Runner/GoogleService-Info.plist
          echo "--- google-services.json first 80 chars ---"
          head -c 80 android/app/google-services.json
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate Hive adapters
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build Android APK
        script: |
          flutter build apk --release --split-per-abi \
            --dart-define=GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_IOS_API_KEY
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  ios-release:
    name: ChargeShield iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.chargeshield.app
        APP_NAME: ChargeShield
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
    scripts:
      - name: Decode Firebase config files
        script: |
          printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d '[:space:]' | base64 --decode > android/app/google-services.json
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" | tr -d '[:space:]' | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate Hive adapters
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS unsigned IPA
        script: |
          flutter build ios --release --no-codesign
          cd ios && xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/build/Runner.xcarchive
