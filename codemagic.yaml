workflows:
  android-release:
    name: ChargeShield Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        BUNDLE_ID: com.chargeshield.app
        DVLA_API_KEY: $DVLA_API_KEY
        GOOGLE_MAPS_API_KEY: $GOOGLE_MAPS_IOS_API_KEY
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate Hive adapters
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Build Android APK
        script: |
          flutter build apk --release --split-per-abi \
            --dart-define=DVLA_API_KEY=$DVLA_API_KEY \
            --dart-define=GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  ios-release:
    name: ChargeShield iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.chargeshield.app
        APP_NAME: ChargeShield
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        DVLA_API_KEY: $DVLA_API_KEY
        GOOGLE_MAPS_API_KEY: $GOOGLE_MAPS_IOS_API_KEY
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate Hive adapters
        script: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS unsigned IPA
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=DVLA_API_KEY=$DVLA_API_KEY \
            --dart-define=GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r ChargeShield.ipa Payload
          mkdir -p $CM_BUILD_DIR/output
          mv ChargeShield.ipa $CM_BUILD_DIR/output/ChargeShield.ipa
    artifacts:
      - $CM_BUILD_DIR/output/ChargeShield.ipa
