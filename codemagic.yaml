workflows:
  ios-release:
    name: ChargeShield iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials   # ASC_KEY_ID, ASC_ISSUER_ID, ASC_PRIVATE_KEY
        - firebase                # GOOGLE_MAPS_IOS_API_KEY, FIREBASE_IOS_APP_ID
      vars:
        BUNDLE_ID: com.chargeshield.app
        APP_NAME: ChargeShield
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Inject Google Maps API key into xcconfig
        script: |
          # Write key into Flutter's Generated xcconfig so Info.plist can resolve it
          echo "GOOGLE_MAPS_IOS_API_KEY=$GOOGLE_MAPS_IOS_API_KEY" \
            >> ios/Flutter/Release.xcconfig

      - name: Copy GoogleService-Info.plist
        script: |
          # Expects GOOGLE_SERVICE_INFO_PLIST env var (base64-encoded) set in Codemagic
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode \
            > ios/Runner/GoogleService-Info.plist

      - name: Pod install
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS IPA
        script: |
          flutter build ios --release --no-codesign
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $ASC_KEY_ID
        key_id: $ASC_KEY_ID
        issuer_id: $ASC_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: ChargeShield Android Release
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      groups:
        - keystore                # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_STORE_PASSWORD
      vars:
        PACKAGE_NAME: com.chargeshield.app
        # These must be set as plain (non-secret) variables in Codemagic app settings:
        GOOGLE_SERVICES_JSON: $GOOGLE_SERVICES_JSON
        GOOGLE_SERVICE_INFO_PLIST: $GOOGLE_SERVICE_INFO_PLIST

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Decode Firebase config files
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Set up keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > $CM_BUILD_DIR/keystore.jks
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_STORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_BUILD_DIR/keystore.jks
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Generate Hive adapters
        script: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android APKs
        script: flutter build apk --release --split-per-abi

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/mapping/release/mapping.txt
