name: chargeshield
description: London charge zone detection and payment reminder app for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Location & background GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.3

  # Notifications
  flutter_local_notifications: ^17.2.1
  firebase_core: ^3.4.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.1.0
  timezone: ^0.9.4

  # Storage
  sqflite: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1

  # Maps
  google_maps_flutter: ^2.7.0

  # UI & fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^14.2.0

  # Utilities
  uuid: ^4.4.0
  device_info_plus: ^10.0.0
  intl: ^0.19.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.10
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/play_store_icon.png"
  adaptive_icon_background: "#07090F"
  adaptive_icon_foreground: "assets/icons/play_store_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
